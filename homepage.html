<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Payoo | Home</title>
        <link rel="stylesheet" href="./style.css">
        <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
            type="text/css" />
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- font awesome cdn -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <!-- google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
    </head>
    <body class="min-h-screen max-w-md bg-base-200 mx-auto">
        <header
            class="border-b-2 border-gray-300 sticky top-0 bg-base-200 z-10">
            <section
                class="w-11/12 mx-auto py-3 flex justify-between items-center">
                <div class="left flex gap-1">
                    <div class="logo w-[60px]">
                        <img src="./assets/logo.png" alt>
                    </div>
                    <div class="balance">
                        <h2
                            class="font-extrabold text-[18px] text-[#080808]/90">$<span
                                id="balance">45000</span></h2>
                        <p
                            class="font-normal text-[14px] text-[#080808]/50">Available
                            Balance</p>
                    </div>
                </div>

                <div class="right">
                    <a href="./index.html" class="btn btn-soft"><i
                            class="fa-solid fa-arrow-right-from-bracket"></i>
                        Logout</a>
                </div>
            </section>
        </header>
        <section class="w-11/12 mx-auto py-10 space-y-5">
            <h1 class="font-bold text-[24px] text-[#080808]">Welcome to Pay<span
                    class="text-[#7460FF]">oo</span></h1>
            <p class="font-normal text-[16px] text-[#080808]/50">Enjoy easy and
                convenient financial services with us.Cashout charge is low and
            </p>

            <div class="buttons grid grid-cols-3 gap-3">
                <button onclick="showOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                    <img src="./assets/opt-1.png" alt>
                    <p>Add Money</p>
                </button>
                <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                    <img src="./assets/opt-2.png" alt>
                    <p>Cashout</p>
                </button>
                <button  class="btn flex-col h-full py-4 btn-primary btn-soft">
                    <img src="./assets/opt-3.png" alt>
                    <p>Transfer Money</p>
                </button>
                <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                    <img src="./assets/opt-4.png" alt>
                    <p>Get Bonus</p>
                </button>
                <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                    <img src="./assets/opt-4.png" alt>
                    <p>Pay Bill</p>
                </button>
                <button class="btn flex-col h-full py-4 btn-primary btn-soft">
                    <img src="./assets/opt-1.png" alt>
                    <p>Transactions</p>
                </button>

            </div>
        </section>

        <section id="add-money" class="w-11/12 mx-auto py-5 hidden ">
            <h2 class="font-semibold text-[18px]">Add Money</h2>
            <div
                class="card bg-base-100 w-full shadow rounded-2xl ">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label
                            class="label font-medium text-[16px] text-[#080808]">Select A Bank</label>
                        <select id="add-money-bank" class="select font-light text-[16px] text-[#080808]/90 rounded-full bg-base-200 w-full ">
                            <option disabled selected>Select Bank</option>
                            <option value="DBBL">Dutch Bangla Bank Limited</option>
                            <option value="IBBL">Islami Bank Bangladesh Limited</option>
                            <option value="PBL">Publali Bank Limited</option>
                            <option value="EBL">Estern Bank Limited</option>
                        </select>
                        <br>

                        <label
                            class="label font-medium text-[16px] text-[#080808]">Bank Account Number</label>
                        <input id="add-money-number" maxlength="11" minlength="11"
                            type="text"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200 w-full"
                            placeholder="Enter 11 digit account number" />
                        <br>
                        <label
                            class="label font-medium text-[16px] text-[#080808]">Amount to Add</label>
                        <input id="add-money-amount" maxlength="11" minlength="11"
                            type="number"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200 w-full"
                            placeholder="Add Amount to withdraw" />
                        <br>
                        <label
                            class="label font-medium text-[16px] text-[#080808]">
                            Pin Number</label>
                        <input id="add-money-pin" maxlength="4" type="password"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200 w-full "
                            placeholder="Enter 4 digit pin number" />
                        <!-- <div><a class="link link-hover">Forgot
                                    password?</a></div> -->
                        <button id="add-money-btn"
                            class="btn bg-[#3B25C1] text-[#FFFFFF] mt-4 rounded-full text-[20px] font-semibold py-7">Add Money</button>
                    </fieldset>
                </div>
            </div>

        </section>

        <section id="cashout" class="w-11/12 mx-auto py-5 ">
            <h2 class="font-semibold text-[18px]">Cash Out</h2>
            <div
                class="card bg-base-100 w-full shadow rounded-2xl ">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label
                            class="label font-medium text-[16px] text-[#080808]">Agent
                            Number</label>
                        <input id="cashout-number" maxlength="11" minlength="11"
                            type="text"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200 w-full"
                            placeholder="Enter 11 digit number" />
                        <br>
                        <label
                            class="label font-medium text-[16px] text-[#080808]">Amount</label>
                        <input id="cashout-amount" maxlength="11" minlength="11"
                            type="number"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200 w-full"
                            placeholder="Enter amount to withdraw" />
                        <br>
                        <label
                            class="label font-medium text-[16px] text-[#080808]">
                            Pin Number</label>
                        <input id="cashout-pin" maxlength="4" type="password"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200 w-full "
                            placeholder="Enter 4 digit pin number" />
                        <!-- <div><a class="link link-hover">Forgot
                                    password?</a></div> -->
                        <button id="cashoout-btn"
                            class="btn bg-[#3B25C1] text-[#FFFFFF] mt-4 rounded-full text-[20px] font-semibold py-7">Withdraw
                            Money</button>
                    </fieldset>
                </div>
            </div>
        </section>

        <script src="./script/machine.js"></script>
        <script src="./script/addMoney.js"></script>
        <script src="./script/cashout.js"></script>
    </body>
</html>
