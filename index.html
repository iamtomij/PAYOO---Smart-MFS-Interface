<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Payoo | Login</title>
        <link rel="stylesheet" href="./style.css">
        <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
        <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"
            type="text/css" />
        <script
            src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- font awesome cdn -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
            crossorigin="anonymous" referrerpolicy="no-referrer" />
        <!-- google fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Anek+Bangla:wght@100..800&family=Dancing+Script:wght@400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
    </head>
    <body class="min-h-screen max-w-md bg-base-200 mx-auto">
        <div class="logo mx-auto w-[263px] pt-[102px]  ">
            <img src="./assets/Logo-full.png" alt>
        </div>
        <div class="form pt-[32px]">
            <div
                class="card bg-base-100  w-full max-w-sm shrink-0 shadow mx-auto rounded-2xl ">
                <div class="card-body">
                    <fieldset class="fieldset">
                        <label
                            class="label font-medium text-[16px] text-[#080808]">Mobile
                            Number</label>
                        <input id="input-number" maxlength="11" minlength="11" type="text"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200"
                            placeholder="Enter your number" />
                        <br>
                        <label
                            class="label font-medium text-[16px] text-[#080808]">4
                            Digit Pin</label>
                        <input id="input-password" maxlength="4" type="password"
                            class="input font-light text-[16px] text-[#080808] rounded-full bg-base-200 "
                            placeholder="Enter 4 Digit Pin" />
                        <!-- <div><a class="link link-hover">Forgot
                                    password?</a></div> -->
                        <button id="btn-login"
                            class="btn bg-[#3B25C1] text-[#FFFFFF] mt-4 rounded-full text-[20px] font-semibold py-7">Login</button>
                    </fieldset>
                </div>
            </div>
        </div>

        <script src="./script/login.js"></script>
    </body>
</html>
